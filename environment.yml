# Project environment for the dds dashboard.
# Create with:  mamba env create -f environment.yml
# Update with:  mamba env update -f environment.yml --prune
# Channels are pinned to conda-forge + bioconda (no defaults/anaconda).
name: rnaseq_dashboard
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base>=4.4
  # App runtime (Imports)
  - r-shiny
  - r-bslib
  - r-sass               # font_google() / SCSS compilation behind the bslib theme
  # UI / UX components
  - r-dt                 # editable metadata tables, results browsing
  - r-shinywidgets       # richer inputs
  - r-shinycssloaders    # loading spinners for slow renders
  - r-thematic           # ggplots match the bslib theme
  - r-ps                 # session memory footprint (process RSS) in the status bar
  - r-jsonlite           # palette config import/export (Palette page Config tab)
  # Plotting / data wrangling / IO
  - r-ggplot2
  - r-ggrepel            # non-overlapping gene labels on DE plots (MA/volcano)
  - r-plotly             # optional interactive plot engine (ggplotly); QC toggle
  - r-rcolorbrewer       # palette catalogue (Palette page: qual/seq/div)
  - r-viridislite        # viridis palette catalogue (Palette page)
  - r-ggvenndiagram      # Venn diagrams (Gene Sets Compare > Overlap); eulerr fallback
  # eulerr (area-proportional Euler for Compare > Overlap) is NOT on conda-forge
  # for osx-arm64 (only osx-64 / linux-64 / win-64), so it is installed from CRAN
  # rather than here -- the one documented exception to the conda-only policy.
  # eulerr >= 7 needs a Rust toolchain to build; 6.1.1 is the last C++-only
  # release, so pin that to avoid pulling in rustc:
  #   Rscript -e 'install.packages(c("polyclip","polylabelr"), repos="https://cloud.r-project.org"); install.packages("https://cran.r-project.org/src/contrib/Archive/eulerr/eulerr_6.1.1.tar.gz", repos=NULL, type="source")'
  # When eulerr is absent the app degrades to ggVennDiagram (Venn only, no Euler).
  - r-dplyr              # gene-metadata filtering
  - r-matrixstats        # fast rowVars for variable-gene selection
  - r-readr
  - r-readxl
  - r-writexl            # XLSX export
  # Reproducibility / reporting
  - r-rmarkdown
  - r-sessioninfo
  # Compute (dim. reduction)
  - r-rtsne              # t-SNE (mainly single-cell path)
  - r-uwot               # UMAP (mainly single-cell path)
  # Package development workflow
  - r-devtools
  - r-roxygen2
  - r-testthat>=3.0.0
  - r-withr                # scoped options() in tests (withr::local_options)
  # Shiny module server logic is tested with shiny::testServer() (built-in);
  # shinytest2 is not on conda-forge, so it's intentionally omitted.
  # Bioconductor core (the dds object, QC, heatmaps, annotation)
  - bioconductor-deseq2
  - bioconductor-summarizedexperiment
  - bioconductor-singlecellexperiment
  - bioconductor-scater
  - bioconductor-complexheatmap
  - r-circlize                      # colorRamp2 palettes for ComplexHeatmap
  - bioconductor-rtracklayer        # read GTF/GFF annotation
  - bioconductor-genomicranges      # union-exon feature_length (reduce/width)
  - bioconductor-iranges            # width() on reduced ranges
  # Bioconductor analysis & annotation
  - bioconductor-edger             # filterByExpr feature filtering
  - bioconductor-apeglm            # LFC shrinkage (lfcShrink)
  - r-ashr                         # LFC shrinkage (alternative; CRAN pkg)
  - bioconductor-matrixgenerics    # rowVars on SE/dds assays
  - bioconductor-annotationdbi     # OrgDb querying
  - bioconductor-org.mm.eg.db      # mouse annotation
  - bioconductor-org.hs.eg.db      # human annotation
  - bioconductor-scran             # single-cell normalization (later phase)
  # exonic feature length uses the direct rtracklayer route;
  # GenomicFeatures/txdbmaker are optional and intentionally omitted.
